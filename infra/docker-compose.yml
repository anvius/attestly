services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/doccum.db
    volumes:
      - backend-data:/data
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "4173:4173"
    environment:
      - PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - backend
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - frontend

volumes:
  backend-data:

