# Dokploy deployment: create a "Docker Compose" project, point it to
# the Git repo and set Compose Path to "infra/compose.dokploy.yaml".
# Dokploy clones the repo and runs `docker compose build` on the server
# — no registry needed, images are built from source.
#
# Required env vars in Dokploy project settings (Environment tab):
#   CAPTCHA_SECRET      — run: openssl rand -hex 32
#   SMTP_USERNAME       — e.g. doccum@lexemas.com
#   SMTP_PASSWORD       — SMTP password
#   GOATCOUNTER_EMAIL   — analytics admin email
#   GOATCOUNTER_PASSWORD — analytics admin password
#
# Traefik entrypoints assumed: web (80), websecure (443) with certresolver=letsencrypt
# — both are pre-configured by Dokploy.

services:
  doccum-backend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.backend
    environment:
      - PORT=3000
      - DB_PATH=/data/doccum.db
      - CAPTCHA_SECRET=${CAPTCHA_SECRET}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - doccum-backend-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      # HTTP → HTTPS redirect
      - traefik.http.routers.doccum-backend-http.rule=Host(`api.doccum.com`)
      - traefik.http.routers.doccum-backend-http.entrypoints=web
      - traefik.http.routers.doccum-backend-http.middlewares=https-redirect
      # HTTPS
      - traefik.http.routers.doccum-backend.rule=Host(`api.doccum.com`)
      - traefik.http.routers.doccum-backend.entrypoints=websecure
      - traefik.http.routers.doccum-backend.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-backend.loadbalancer.server.port=3000

  doccum-frontend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.frontend
      args:
        VITE_API_BASE_URL: https://api.doccum.com
    environment:
      - HOST=0.0.0.0
      - PORT=4173
      - ORIGIN=https://doccum.com
    depends_on:
      - doccum-backend
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      # Middlewares (definidos una sola vez, aquí en el servicio principal)
      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.www-to-nonwww.redirectregex.regex=^https?://www\.doccum\.com(.*)
      - traefik.http.middlewares.www-to-nonwww.redirectregex.replacement=https://doccum.com$${1}
      - traefik.http.middlewares.www-to-nonwww.redirectregex.permanent=true
      # HTTP → HTTPS (doccum.com y www.doccum.com)
      - traefik.http.routers.doccum-frontend-http.rule=Host(`doccum.com`) || Host(`www.doccum.com`)
      - traefik.http.routers.doccum-frontend-http.entrypoints=web
      - traefik.http.routers.doccum-frontend-http.middlewares=https-redirect
      # HTTPS www → non-www
      - traefik.http.routers.doccum-frontend-www.rule=Host(`www.doccum.com`)
      - traefik.http.routers.doccum-frontend-www.entrypoints=websecure
      - traefik.http.routers.doccum-frontend-www.tls.certresolver=letsencrypt
      - traefik.http.routers.doccum-frontend-www.middlewares=www-to-nonwww
      # HTTPS principal
      - traefik.http.routers.doccum-frontend.rule=Host(`doccum.com`)
      - traefik.http.routers.doccum-frontend.entrypoints=websecure
      - traefik.http.routers.doccum-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-frontend.loadbalancer.server.port=4173

  doccum-analytics:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.analytics
    environment:
      - GOATCOUNTER_VHOST=stats.doccum.com
      - GOATCOUNTER_EMAIL=${GOATCOUNTER_EMAIL:-admin@doccum.com}
      - GOATCOUNTER_PASSWORD=${GOATCOUNTER_PASSWORD:-changeme}
    volumes:
      - doccum-analytics-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      # HTTP → HTTPS redirect
      - traefik.http.routers.doccum-analytics-http.rule=Host(`stats.doccum.com`)
      - traefik.http.routers.doccum-analytics-http.entrypoints=web
      - traefik.http.routers.doccum-analytics-http.middlewares=https-redirect
      # HTTPS
      - traefik.http.routers.doccum-analytics.rule=Host(`stats.doccum.com`)
      - traefik.http.routers.doccum-analytics.entrypoints=websecure
      - traefik.http.routers.doccum-analytics.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-analytics.loadbalancer.server.port=8080

volumes:
  doccum-backend-data:
  doccum-analytics-data:

networks:
  dokploy-network:
    external: true
